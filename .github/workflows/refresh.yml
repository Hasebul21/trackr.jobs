name: Refresh jobs

on:
  schedule:
    # every 2 hours, on the hour, UTC
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/refresh
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            --max-time 240 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/refresh" \
            | head -c 4000
          echo
